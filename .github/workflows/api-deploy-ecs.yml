# =============================================================================
# API Deploy on ECS (Blue/Green)
# =============================================================================
#
# Blue/Greenデプロイのため、デプロイ後に手動承認が必要です。
#
# 1. このワークフローが実行されると、新バージョンがGreen環境にデプロイされる
# 2. テスト用ポート(:9000)で新バージョンの動作確認を行う
#    curl http://<ALB_DNS>:9000/health
# 3. 承認して本番トラフィックを切り替える:
#    aws ssm put-parameter --name "/sns-battle-dev-service/deploy/approval" --value "approved" --overwrite
# 4. ロールバックする場合:
#    aws ssm put-parameter --name "/sns-battle-dev-service/deploy/approval" --value "rejected" --overwrite
#
# ※ 承認しない限り、本番(:80)には反映されません
# =============================================================================

name: API Deploy on ECS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/api/**'
      - 'packages/schema/**'
      - '.github/workflows/api-deploy-ecs.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

env:
  AWS_REGION: ap-northeast-1
  ## TODO: 以下の値をプロジェクトに合わせて変更してください
  ## 命名規則: Terraform の ${project_name}-${environment}-xxx に合わせる
  ECS_CLUSTER: sns-battle-dev-cluster       # TODO: ECS クラスター名に変更
  ECS_SERVICE: sns-battle-dev-service        # TODO: ECS サービス名に変更
  TASK_DEFINITION_FAMILY: sns-battle-dev-task # TODO: ECS タスク定義のファミリー名に変更
  ECR_REPOSITORY: sns-battle-server            # ECR リポジトリ名
  CONTAINER_NAME: sns-battle-dev-api

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          ## TODO: GitHub リポジトリの Settings → Secrets に AWS_ROLE_ARN を登録してください
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR 
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest \
            -f apps/api/Dockerfile .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
    outputs:
      image: ${{ steps.build-image.outputs.image }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          ## TODO: GitHub リポジトリの Settings → Secrets に AWS_ROLE_ARN を登録してください
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
